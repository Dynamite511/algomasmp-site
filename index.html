<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algoma SMP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111;
    color:white;
    text-align:center;
}

.hero{
    background:url("background.png") center center;
    background-size:cover;
    padding:120px 20px;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.65);
}

.hero-content{
    position:relative;
    z-index:1;
}

h1{
    font-size:60px;
    margin-bottom:10px;
}

.subtitle{
    font-size:22px;
    color:#ddd;
    margin-bottom:40px;
}

.cards{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
    margin:50px 20px;
}

.card{
    background:#1d1d1d;
    border-radius:15px;
    width:320px;
    padding:30px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

.card h2{
    margin-bottom:15px;
}

.ip{
    font-size:22px;
    color:#4ade80;
    margin:15px 0;
    word-break:break-word;
}

button{
    background:#2ecc71;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#28b463;
}

.gallery{
    max-width:1200px;
    margin:60px auto;
    padding:20px;
}

.gallery h2{
    margin-bottom:30px;
}

.images{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.images img{
    width:100%;
    border-radius:12px;
}

footer{
    margin:60px 0 30px;
    color:#aaa;
}
</style>

</head>
<body>

<section class="hero">
<div class="hero-content">
<h1>ALGOMA SMP</h1>
<p class="subtitle">Algoma Christian Schools Minecraft Crossplay Server</p>
</div>
</section>

<div class="cards">

<div class="card">
<h2>💻 Java Edition</h2>
<p class="ip" id="javaip">play.algomasmp.net</p>
<button onclick="copyJava()">Copy IP</button>
</div>

<div class="card">
<h2>📱 Bedrock Edition</h2>
<p class="ip" id="bedrockip">play.algomasmp.net with port 25582</p>
<button onclick="copyBedrock()">Copy IP</button>
</div>

</div>

<section class="gallery">
<h2>Server Screenshots</h2>

<div class="images">

<img src="screenshot1.png" alt="Website AlgomaSMP">

<img src="Screenshot 2026-07-15 164057.png" alt="Website AlgomaSMP">

</div>
</section>

<footer>
Created By Byron Bergsma, 2026
</footer>

<script>
function copyJava(){
navigator.clipboard.writeText("play.algomasmp.net");
alert("Java IP copied!");
}

function copyBedrock(){
navigator.clipboard.writeText("ip:play.algomasmp.net       port:25582");
alert("Bedrock IP copied!");
}
</script>

</body>
</html>
